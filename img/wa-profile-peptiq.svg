<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B97A"/>
      <stop offset="50%" stop-color="#C6A969"/>
      <stop offset="100%" stop-color="#9C8751"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full square background (IG/WA both crop to circle) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Decorative thin borders inside safe circle (radius 440 from center 512) -->
  <circle cx="512" cy="512" r="440" fill="none" stroke="#C6A969" stroke-width="1.5" opacity="0.3"/>
  <circle cx="512" cy="512" r="420" fill="none" stroke="#C6A969" stroke-width="0.8" opacity="0.2"/>

  <!-- Tiny accent dot above wordmark -->
  <circle cx="512" cy="420" r="4" fill="#C6A969" opacity="0.75"/>

  <!-- PEPTIQ wordmark - compact, centered on Y=512 -->
  <text x="512" y="510"
        font-family="'Playfair Display', 'Didot', Georgia, serif"
        font-size="168"
        font-weight="500"
        fill="url(#gold)"
        text-anchor="middle"
        letter-spacing="12"
        filter="url(#glow)">PEPTIQ</text>

  <!-- MX subscript -->
  <text x="512" y="565"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="36"
        font-weight="400"
        fill="#C6A969"
        text-anchor="middle"
        letter-spacing="22"
        opacity="0.9">MX</text>

  <!-- Thin separator -->
  <line x1="432" y1="605" x2="592" y2="605" stroke="#C6A969" stroke-width="1.2" opacity="0.55"/>

  <!-- Tagline - kept well inside safe circle -->
  <text x="512" y="640"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="20"
        font-weight="500"
        fill="#a89878"
        text-anchor="middle"
        letter-spacing="9"
        opacity="0.95">HACK YOUR LIMITS</text>
</svg>
