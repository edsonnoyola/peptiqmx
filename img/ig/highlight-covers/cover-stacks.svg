<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C981"/>
      <stop offset="50%" stop-color="#C6A969"/>
      <stop offset="100%" stop-color="#8f7a4d"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1308"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="540" cy="960" r="420" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.35"/>

  <text x="540" y="860" font-family="'Playfair Display',Georgia,serif" font-size="32" font-style="italic" fill="#C6A969" text-anchor="middle" letter-spacing="14" opacity="0.75">protocolos pre-armados</text>

  <!-- stacked bars icon -->
  <g transform="translate(540 960)">
    <rect x="-180" y="-90" width="360" height="34" rx="4" fill="url(#gold)" opacity="0.95"/>
    <rect x="-150" y="-40" width="300" height="34" rx="4" fill="url(#gold)" opacity="0.75"/>
    <rect x="-120" y="10" width="240" height="34" rx="4" fill="url(#gold)" opacity="0.55"/>
  </g>

  <text x="540" y="1160" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="180" font-weight="800" fill="url(#gold)" text-anchor="middle" letter-spacing="10">STACKS</text>
  <line x1="380" y1="1230" x2="700" y2="1230" stroke="#C6A969" stroke-width="1" opacity="0.6"/>
  <text x="540" y="1300" font-family="'Inter',sans-serif" font-size="26" fill="#a8987a" text-anchor="middle" letter-spacing="8">8 COMBINACIONES · 1 OBJETIVO</text>
</svg>
