<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0b07"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C981"/>
      <stop offset="50%" stop-color="#C6A969"/>
      <stop offset="100%" stop-color="#8f7a4d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Eyebrow -->
  <text x="540" y="140" font-family="'Inter', sans-serif" font-size="22" fill="#C6A969" text-anchor="middle" letter-spacing="14" opacity="0.75">DISCRECIÓN · VELOCIDAD</text>

  <!-- Big number -->
  <text x="540" y="490" font-family="'Playfair Display', Georgia, serif" font-size="340" font-weight="500" fill="url(#gold)" text-anchor="middle" letter-spacing="-8">24-72h</text>

  <line x1="390" y1="550" x2="690" y2="550" stroke="#C6A969" stroke-width="1" opacity="0.55"/>

  <!-- Copy -->
  <text x="540" y="650" font-family="'Playfair Display', Georgia, serif" font-size="62" font-weight="500" fill="#f0e4c8" text-anchor="middle" font-style="italic">Envío nacional puerta a puerta.</text>

  <!-- Features -->
  <g font-family="'Inter', sans-serif" fill="#cfc3a5" text-anchor="middle" font-size="30">
    <text x="540" y="760">· Empaque discreto sin marcas externas ·</text>
    <text x="540" y="810">· Control de temperatura en tránsito ·</text>
    <text x="540" y="860">· Guía de rastreo al confirmar pago ·</text>
  </g>

  <!-- Bottom -->
  <line x1="80" y1="980" x2="1000" y2="980" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="1020" font-family="'Inter', sans-serif" font-size="26" font-weight="600" fill="url(#gold)" text-anchor="middle" letter-spacing="10">PEPTIQ MX · MÉXICO</text>
</svg>
