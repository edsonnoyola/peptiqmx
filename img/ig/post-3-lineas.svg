<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0b07"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C981"/>
      <stop offset="50%" stop-color="#C6A969"/>
      <stop offset="100%" stop-color="#8f7a4d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Header -->
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="142" font-family="'Inter', sans-serif" font-size="22" fill="#C6A969" text-anchor="middle" letter-spacing="14" opacity="0.75">SEIS LÍNEAS · UN ESTÁNDAR</text>

  <text x="540" y="238" font-family="'Playfair Display', Georgia, serif" font-size="68" font-weight="500" fill="#f0e4c8" text-anchor="middle" font-style="italic">Diseñadas para un objetivo.</text>

  <!-- Single column list, 6 rows. Width 880 centered at 540. Each row 90px tall. -->
  <g font-family="'Inter', sans-serif">
    <!-- WOLVERINE -->
    <g transform="translate(540 340)">
      <rect x="-440" y="-40" width="880" height="85" rx="10" fill="none" stroke="#7A1C1C" stroke-width="2" opacity="0.85"/>
      <text x="-420" y="-5" font-size="34" font-weight="700" fill="#b53d3d" letter-spacing="4">WOLVERINE</text>
      <text x="-420" y="30" font-size="22" fill="#a8987a">Recovery · BPC-157 · TB-500 · KPV · HEAL Stack</text>
    </g>

    <!-- HIGHLANDER -->
    <g transform="translate(540 440)">
      <rect x="-440" y="-40" width="880" height="85" rx="10" fill="none" stroke="#C6A969" stroke-width="2" opacity="0.9"/>
      <text x="-420" y="-5" font-size="34" font-weight="700" fill="#C6A969" letter-spacing="4">HIGHLANDER</text>
      <text x="-420" y="30" font-size="22" fill="#a8987a">Longevity · NAD+ · Epithalon</text>
    </g>

    <!-- GLOW -->
    <g transform="translate(540 540)">
      <rect x="-440" y="-40" width="880" height="85" rx="10" fill="none" stroke="#7a8a4a" stroke-width="2" opacity="0.9"/>
      <text x="-420" y="-5" font-size="34" font-weight="700" fill="#a8c06a" letter-spacing="4">GLOW</text>
      <text x="-420" y="30" font-size="22" fill="#a8987a">Aesthetic · GHK-Cu · AHK-Cu · TRINITY</text>
    </g>

    <!-- PRIME -->
    <g transform="translate(540 640)">
      <rect x="-440" y="-40" width="880" height="85" rx="10" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
      <text x="-420" y="-5" font-size="34" font-weight="700" fill="#f3ecd8" letter-spacing="4">PRIME</text>
      <text x="-420" y="30" font-size="22" fill="#a8987a">Performance · GH Stack · Ipamorelin · Tesamorelin</text>
    </g>

    <!-- SHRED -->
    <g transform="translate(540 740)">
      <rect x="-440" y="-40" width="880" height="85" rx="10" fill="none" stroke="#888888" stroke-width="2" opacity="0.9"/>
      <text x="-420" y="-5" font-size="34" font-weight="700" fill="#d0c9b8" letter-spacing="4">SHRED</text>
      <text x="-420" y="30" font-size="22" fill="#a8987a">Body composition · Retatrutide · Tirzepatide</text>
    </g>

    <!-- SUPPORT -->
    <g transform="translate(540 840)">
      <rect x="-440" y="-40" width="880" height="85" rx="10" fill="none" stroke="#4C7F6A" stroke-width="2" opacity="0.9"/>
      <text x="-420" y="-5" font-size="34" font-weight="700" fill="#78ae95" letter-spacing="4">SUPPORT</text>
      <text x="-420" y="30" font-size="22" fill="#a8987a">Bac water · Accesorios · Protocolos</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="975" x2="1000" y2="975" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="1020" font-family="'Inter', sans-serif" font-size="26" font-weight="600" fill="url(#gold)" text-anchor="middle" letter-spacing="10">CATÁLOGO · PEPTIQMX.COM</text>
</svg>
