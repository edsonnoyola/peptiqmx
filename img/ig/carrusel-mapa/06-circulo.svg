<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000000" stop-opacity="0.6"/><stop offset="100%" stop-color="#000000" stop-opacity="0.95"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E5C981"/><stop offset="100%" stop-color="#8f7a4d"/></linearGradient>
  </defs>
  <image xlink:href="https://peptiqmx.com/img/covers/highlander-hero.png" x="0" y="0" width="1080" height="1080" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1080" height="1080" fill="url(#dark)"/>
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#E5C981" text-anchor="middle" letter-spacing="10">05 · EL CÍRCULO VIRTUOSO</text>
  <text x="540" y="240" font-family="'Playfair Display',Georgia,serif" font-size="42" fill="#f0e4c8" text-anchor="middle" font-style="italic">Por qué este mercado escala solo:</text>
  <g transform="translate(140 350)">
    <g>
      <rect width="800" height="100" fill="rgba(0,0,0,0.6)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="38" font-family="'Inter',sans-serif" font-size="14" fill="#E5C981" letter-spacing="3">PASO 1</text>
      <text x="40" y="70" font-family="'Playfair Display',Georgia,serif" font-size="20" fill="#f0e4c8" font-style="italic">Eficacia biológica brutal · resultado visible 2-4 sem</text>
    </g>
    <g transform="translate(0 120)">
      <rect width="800" height="100" fill="rgba(0,0,0,0.6)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="38" font-size="14" fill="#E5C981" letter-spacing="3">PASO 2</text>
      <text x="40" y="70" font-family="'Playfair Display',Georgia,serif" font-size="20" fill="#f0e4c8" font-style="italic">Demanda de consumo inelástica · regresan</text>
    </g>
    <g transform="translate(0 240)">
      <rect width="800" height="100" fill="rgba(0,0,0,0.6)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="38" font-size="14" fill="#E5C981" letter-spacing="3">PASO 3</text>
      <text x="40" y="70" font-family="'Playfair Display',Georgia,serif" font-size="20" fill="#f0e4c8" font-style="italic">Fijan precio premium · margen alto sin objeción</text>
    </g>
    <g transform="translate(0 360)">
      <rect width="800" height="100" fill="rgba(0,0,0,0.6)" stroke="url(#gold)" stroke-width="2" rx="2"/>
      <text x="40" y="38" font-size="14" fill="#E5C981" letter-spacing="3">PASO 4 · LOOP</text>
      <text x="40" y="70" font-family="'Playfair Display',Georgia,serif" font-size="20" fill="url(#gold)" font-style="italic">Reinvierten en nuevos protocolos · expanden gasto</text>
    </g>
  </g>
  <text x="540" y="900" font-family="'Playfair Display',Georgia,serif" font-size="22" fill="url(#gold)" text-anchor="middle" font-style="italic">No requiere crear necesidad. Requiere abastecer una real.</text>
  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">06 / 08</text>
</svg>
