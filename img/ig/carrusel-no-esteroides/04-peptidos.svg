<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="goldOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E5C981"/><stop offset="100%" stop-color="#8f7a4d"/></linearGradient>
  </defs>
  <image xlink:href="https://peptiqmx.com/img/covers/glow-hero.png" x="0" y="0" width="1080" height="1080" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1080" height="1080" fill="url(#goldOverlay)"/>

  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.6"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#E5C981" text-anchor="middle" letter-spacing="10">03 · PÉPTIDOS</text>

  <text x="540" y="500" font-family="'Inter',sans-serif" font-size="22" fill="#E5C981" text-anchor="middle" letter-spacing="6">LA AMPLIFICACIÓN</text>
  <text x="540" y="610" font-family="'Playfair Display',Georgia,serif" font-size="76" font-weight="500" fill="url(#gold)" text-anchor="middle" font-style="italic">Despiertan tu sistema.</text>

  <line x1="420" y1="660" x2="660" y2="660" stroke="#C6A969" stroke-width="1" opacity="0.7"/>

  <g transform="translate(140 720)" font-family="'Inter',sans-serif">
    <g>
      <rect width="800" height="60" fill="rgba(0,0,0,0.55)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="40" font-size="18" fill="#f0e4c8"><tspan fill="#E5C981">→ </tspan>Cadenas de aminoácidos como señalizadores</text>
    </g>
    <g transform="translate(0 75)">
      <rect width="800" height="60" fill="rgba(0,0,0,0.55)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="40" font-size="18" fill="#f0e4c8"><tspan fill="#E5C981">→ </tspan>Activan vías naturales (GH endógena, angiogénesis)</text>
    </g>
    <g transform="translate(0 150)">
      <rect width="800" height="60" fill="rgba(0,0,0,0.55)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="40" font-size="18" fill="#f0e4c8"><tspan fill="#E5C981">→ </tspan>Vida media corta · biocompatibles · ajustables</text>
    </g>
  </g>

  <text x="540" y="940" font-family="'Inter',sans-serif" font-size="16" fill="#E5C981" text-anchor="middle" letter-spacing="4">EJ. CJC-1295 + IPAMORELIN · BPC-157 · GHK-CU</text>

  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.6"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">04 / 08</text>
</svg>
