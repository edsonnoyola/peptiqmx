<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000000" stop-opacity="0.55"/><stop offset="100%" stop-color="#000000" stop-opacity="0.95"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E5C981"/><stop offset="100%" stop-color="#8f7a4d"/></linearGradient>
  </defs>
  <image xlink:href="https://peptiqmx.com/img/covers/prime-hero.png" x="0" y="0" width="1080" height="1080" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1080" height="1080" fill="url(#dark)"/>
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#E5C981" text-anchor="middle" letter-spacing="10">01 · EL PROBLEMA</text>

  <text x="540" y="280" font-family="'Playfair Display',Georgia,serif" font-size="48" fill="#f0e4c8" text-anchor="middle" font-style="italic">A los 50 años,</text>
  <text x="540" y="340" font-family="'Playfair Display',Georgia,serif" font-size="48" fill="#f0e4c8" text-anchor="middle" font-style="italic">tienes la mitad del NAD+</text>
  <text x="540" y="400" font-family="'Playfair Display',Georgia,serif" font-size="48" fill="url(#gold)" text-anchor="middle" font-style="italic">que tenías a los 20.</text>

  <g transform="translate(140 480)">
    <rect width="800" height="60" fill="rgba(255,255,255,0.1)" rx="2"/>
    <rect width="800" height="60" fill="url(#gold)" rx="2"/>
    <text x="40" y="40" font-family="'Inter',sans-serif" font-size="22" fill="#0e0b07" font-weight="600">20 AÑOS · 100% NAD+</text>
  </g>
  <g transform="translate(140 555)">
    <rect width="800" height="60" fill="rgba(255,255,255,0.1)" rx="2"/>
    <rect width="600" height="60" fill="#a8987a" rx="2"/>
    <text x="40" y="40" font-family="'Inter',sans-serif" font-size="22" fill="#0e0b07" font-weight="600">35 AÑOS · 75% NAD+</text>
  </g>
  <g transform="translate(140 630)">
    <rect width="800" height="60" fill="rgba(255,255,255,0.1)" rx="2"/>
    <rect width="400" height="60" fill="#7a6a4a" rx="2"/>
    <text x="40" y="40" font-family="'Inter',sans-serif" font-size="22" fill="#f0e4c8" font-weight="600">50 AÑOS · 50% NAD+</text>
  </g>
  <g transform="translate(140 705)">
    <rect width="800" height="60" fill="rgba(255,255,255,0.1)" rx="2"/>
    <rect width="200" height="60" fill="#5a4a2a" rx="2"/>
    <text x="40" y="40" font-family="'Inter',sans-serif" font-size="22" fill="#f0e4c8" font-weight="600">70 AÑOS · 25% NAD+</text>
  </g>

  <text x="540" y="850" font-family="'Playfair Display',Georgia,serif" font-size="28" fill="#f0e4c8" text-anchor="middle" font-style="italic">Sin NAD+, las mitocondrias se apagan.</text>
  <text x="540" y="900" font-family="'Inter',sans-serif" font-size="14" fill="#a8987a" text-anchor="middle" letter-spacing="2">SINCLAIR LAB · HARVARD MED SCHOOL · 2024</text>

  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">02 / 08</text>
</svg>
