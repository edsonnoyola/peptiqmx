<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000000" stop-opacity="0.55"/><stop offset="100%" stop-color="#000000" stop-opacity="0.95"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E5C981"/><stop offset="100%" stop-color="#8f7a4d"/></linearGradient>
  </defs>
  <image xlink:href="https://peptiqmx.com/img/covers/highlander-hero.png" x="0" y="0" width="1080" height="1080" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1080" height="1080" fill="url(#dark)"/>
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#E5C981" text-anchor="middle" letter-spacing="10">05 · CÓMO FUNCIONA</text>
  <text x="540" y="240" font-family="'Playfair Display',Georgia,serif" font-size="42" fill="#f0e4c8" text-anchor="middle" font-style="italic">Combustible + máquina.</text>
  <text x="540" y="290" font-family="'Playfair Display',Georgia,serif" font-size="42" fill="url(#gold)" text-anchor="middle" font-style="italic">Sin uno · el otro no opera.</text>

  <g transform="translate(140 380)">
    <g>
      <rect width="800" height="86" fill="rgba(0,0,0,0.55)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="36" font-family="'Inter',sans-serif" font-size="14" fill="#E5C981" letter-spacing="3">PASO 1 · NAD+ DECLINA</text>
      <text x="40" y="66" font-family="'Inter',sans-serif" font-size="18" fill="#f0e4c8">PARPs y CD38 sobreactivados consumen NAD+ en exceso.</text>
    </g>
    <g transform="translate(0 110)">
      <rect width="800" height="86" fill="rgba(0,0,0,0.55)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="36" font-size="14" fill="#E5C981" letter-spacing="3">PASO 2 · SIRTUINAS SE DETIENEN</text>
      <text x="40" y="66" font-family="'Inter',sans-serif" font-size="18" fill="#f0e4c8">Sin NAD+, las 7 sirtuinas dejan de funcionar.</text>
    </g>
    <g transform="translate(0 220)">
      <rect width="800" height="86" fill="rgba(0,0,0,0.55)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="36" font-size="14" fill="#E5C981" letter-spacing="3">PASO 3 · ENVEJECIMIENTO ACELERA</text>
      <text x="40" y="66" font-family="'Inter',sans-serif" font-size="18" fill="#f0e4c8">Daño ADN se acumula · mitocondrias colapsan.</text>
    </g>
    <g transform="translate(0 330)">
      <rect width="800" height="86" fill="rgba(0,0,0,0.55)" stroke="url(#gold)" stroke-width="2" rx="2"/>
      <text x="40" y="36" font-size="14" fill="#E5C981" letter-spacing="3">SOLUCIÓN · RESTAURAR NAD+</text>
      <text x="40" y="66" font-family="'Playfair Display',Georgia,serif" font-size="20" fill="url(#gold)" font-style="italic">Sirtuinas se reactivan. Reloj biológico se recalibra.</text>
    </g>
  </g>

  <text x="540" y="900" font-family="'Inter',sans-serif" font-size="14" fill="#a8987a" text-anchor="middle" letter-spacing="2">CD38 DICTATES NAD+ HOMEOSTASIS · NIH PMC</text>
  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">06 / 08</text>
</svg>
