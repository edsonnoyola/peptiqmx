<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1f1a12"/>
      <stop offset="70%" stop-color="#0a0906"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C981"/>
      <stop offset="50%" stop-color="#C6A969"/>
      <stop offset="100%" stop-color="#8f7a4d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="540" cy="540" r="480" fill="none" stroke="#C6A969" stroke-width="1.5" opacity="0.35"/>

  <!-- Vial icon -->
  <g transform="translate(540 500)" stroke="url(#gold)" fill="none" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
    <!-- Cap -->
    <rect x="-60" y="-230" width="120" height="40" rx="6" fill="url(#gold)"/>
    <!-- Neck -->
    <rect x="-70" y="-190" width="140" height="30" rx="4" stroke-width="10" fill="none"/>
    <!-- Body -->
    <path d="M -90 -160 L -90 170 Q -90 210 -50 210 L 50 210 Q 90 210 90 170 L 90 -160 Z"/>
    <!-- Powder level -->
    <path d="M -90 100 L 90 100" stroke-width="6" opacity="0.5"/>
  </g>

  <text x="540" y="900"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="58"
        font-weight="600"
        fill="url(#gold)"
        text-anchor="middle"
        letter-spacing="10">PRODUCTOS</text>
</svg>
