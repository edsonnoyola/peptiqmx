<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0b07"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C981"/>
      <stop offset="100%" stop-color="#8f7a4d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="50%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <linearGradient id="maroon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a2929"/>
      <stop offset="100%" stop-color="#4a1414"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#C6A969" text-anchor="middle" letter-spacing="10" opacity="0.75">02 · EL VIAL</text>

  <text x="540" y="230" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">El cristal habla.</text>

  <!-- Vial illustration -->
  <g transform="translate(490 290)">
    <!-- cap -->
    <rect x="20" y="0" width="60" height="40" fill="url(#gold)" rx="3"/>
    <rect x="15" y="35" width="70" height="18" fill="#8f7a4d"/>
    <!-- neck -->
    <rect x="30" y="53" width="40" height="20" fill="#2a1f15"/>
    <!-- glass body -->
    <rect x="10" y="73" width="80" height="280" fill="url(#glass)" rx="2"/>
    <!-- liquid line -->
    <rect x="14" y="220" width="72" height="130" fill="#1a0a0a" opacity="0.8"/>
    <!-- maroon label -->
    <rect x="6" y="160" width="88" height="160" fill="url(#maroon)"/>
    <line x1="14" y1="172" x2="86" y2="172" stroke="url(#gold)" stroke-width="0.8"/>
    <text x="50" y="200" font-family="'Playfair Display',Georgia,serif" font-size="14" fill="#E5C981" text-anchor="middle" letter-spacing="1">HIGHLANDER</text>
    <text x="50" y="222" font-family="'Inter',sans-serif" font-size="9" fill="#f0e4c8" text-anchor="middle" letter-spacing="2">BPC-157 · 10mg</text>
    <line x1="14" y1="235" x2="86" y2="235" stroke="url(#gold)" stroke-width="0.5" opacity="0.5"/>
    <text x="50" y="255" font-family="'Inter',sans-serif" font-size="7" fill="#d4c8a8" text-anchor="middle" letter-spacing="1">LOT PTQ-0421</text>
    <text x="50" y="275" font-family="'Inter',sans-serif" font-size="7" fill="#d4c8a8" text-anchor="middle" letter-spacing="1">EXP 2027-04</text>
    <line x1="14" y1="300" x2="86" y2="300" stroke="url(#gold)" stroke-width="0.5" opacity="0.5"/>
    <text x="50" y="315" font-family="'Inter',sans-serif" font-size="6" fill="#a8987a" text-anchor="middle" letter-spacing="1">RESEARCH USE</text>
  </g>

  <!-- Annotations -->
  <g font-family="'Inter',sans-serif" font-size="15" fill="#C6A969" letter-spacing="2">
    <line x1="320" y1="320" x2="490" y2="320" stroke="#C6A969" stroke-width="0.6"/>
    <text x="315" y="315" text-anchor="end">CAP DORADO</text>
    <text x="315" y="338" text-anchor="end" font-size="12" fill="#a8987a">ferrule + flip-off sello</text>

    <line x1="320" y1="430" x2="490" y2="430" stroke="#C6A969" stroke-width="0.6"/>
    <text x="315" y="425" text-anchor="end">CRISTAL ÁMBAR</text>
    <text x="315" y="448" text-anchor="end" font-size="12" fill="#a8987a">protege de luz UV</text>

    <line x1="590" y1="540" x2="760" y2="540" stroke="#C6A969" stroke-width="0.6"/>
    <text x="765" y="535">LIOFILIZADO</text>
    <text x="765" y="558" font-size="12" fill="#a8987a">polvo blanco al fondo</text>

    <line x1="590" y1="640" x2="760" y2="640" stroke="#C6A969" stroke-width="0.6"/>
    <text x="765" y="635">SELLO INTACTO</text>
    <text x="765" y="658" font-size="12" fill="#a8987a">nunca abierto en tránsito</text>
  </g>

  <text x="540" y="800" font-family="'Playfair Display',Georgia,serif" font-size="36" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">Cap genérico, cristal claro,</text>
  <text x="540" y="850" font-family="'Playfair Display',Georgia,serif" font-size="36" font-weight="400" fill="url(#gold)" text-anchor="middle" font-style="italic">sin sello: descártalo.</text>

  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">03 / 08</text>
</svg>
