<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0b07"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C981"/>
      <stop offset="100%" stop-color="#8f7a4d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#C6A969" text-anchor="middle" letter-spacing="10" opacity="0.75">06 · TU CHECKLIST</text>

  <text x="540" y="240" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">Antes de comprar,</text>
  <text x="540" y="310" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="400" fill="url(#gold)" text-anchor="middle" font-style="italic">pregunta esto:</text>

  <g transform="translate(140 400)">
    <g font-family="'Playfair Display',Georgia,serif" font-size="32" fill="#f0e4c8">
      <text x="0" y="50">01.</text>
      <text x="80" y="50">¿Tiene COA por lote?</text>
      <text x="0" y="125">02.</text>
      <text x="80" y="125">¿Quién lo testeó (3rd party)?</text>
      <text x="0" y="200">03.</text>
      <text x="80" y="200">¿La etiqueta tiene LOT y EXP?</text>
      <text x="0" y="275">04.</text>
      <text x="80" y="275">¿El cristal es ámbar?</text>
      <text x="0" y="350">05.</text>
      <text x="80" y="350">¿Hay reposición por daño?</text>
      <text x="0" y="425">06.</text>
      <text x="80" y="425">¿Incluye asesoría?</text>
    </g>

    <g fill="url(#gold)">
      <text x="0" y="50" font-family="'Playfair Display',Georgia,serif" font-size="32">01.</text>
      <text x="0" y="125" font-family="'Playfair Display',Georgia,serif" font-size="32">02.</text>
      <text x="0" y="200" font-family="'Playfair Display',Georgia,serif" font-size="32">03.</text>
      <text x="0" y="275" font-family="'Playfair Display',Georgia,serif" font-size="32">04.</text>
      <text x="0" y="350" font-family="'Playfair Display',Georgia,serif" font-size="32">05.</text>
      <text x="0" y="425" font-family="'Playfair Display',Georgia,serif" font-size="32">06.</text>
    </g>
  </g>

  <text x="540" y="930" font-family="'Inter',sans-serif" font-size="18" fill="#a8987a" text-anchor="middle" letter-spacing="4">SI ALGUNA RESPUESTA ES "NO" — NO ES RESEARCH-GRADE.</text>

  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">07 / 08</text>
</svg>
