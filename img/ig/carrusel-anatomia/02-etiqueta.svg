<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0b07"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C981"/>
      <stop offset="100%" stop-color="#8f7a4d"/>
    </linearGradient>
    <linearGradient id="maroon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a2929"/>
      <stop offset="100%" stop-color="#4a1414"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#C6A969" text-anchor="middle" letter-spacing="10" opacity="0.75">01 · LA ETIQUETA</text>

  <text x="540" y="230" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">La etiqueta cuenta</text>
  <text x="540" y="300" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">toda la historia.</text>

  <!-- Mock label centered -->
  <g transform="translate(360 380)">
    <rect width="360" height="280" fill="url(#maroon)" rx="4"/>
    <line x1="20" y1="40" x2="340" y2="40" stroke="url(#gold)" stroke-width="1.5"/>
    <text x="180" y="80" font-family="'Playfair Display',Georgia,serif" font-size="36" font-weight="500" fill="#E5C981" text-anchor="middle" letter-spacing="3">HIGHLANDER™</text>
    <text x="180" y="118" font-family="'Inter',sans-serif" font-size="18" fill="#f0e4c8" text-anchor="middle" letter-spacing="4">BPC-157 · 10mg</text>
    <line x1="20" y1="148" x2="340" y2="148" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>
    <text x="40" y="180" font-family="'Inter',sans-serif" font-size="14" fill="#d4c8a8" letter-spacing="2">LOT</text>
    <text x="40" y="205" font-family="'Inter',sans-serif" font-size="18" fill="#f0e4c8" letter-spacing="3">PTQ-0421-A</text>
    <text x="200" y="180" font-family="'Inter',sans-serif" font-size="14" fill="#d4c8a8" letter-spacing="2">EXP</text>
    <text x="200" y="205" font-family="'Inter',sans-serif" font-size="18" fill="#f0e4c8" letter-spacing="3">2027-04</text>
    <text x="180" y="245" font-family="'Inter',sans-serif" font-size="11" fill="#a8987a" text-anchor="middle" letter-spacing="3">FOR RESEARCH USE ONLY</text>
  </g>

  <!-- Annotations -->
  <g font-family="'Inter',sans-serif" font-size="16" fill="#C6A969" letter-spacing="2">
    <line x1="200" y1="460" x2="350" y2="460" stroke="#C6A969" stroke-width="0.6"/>
    <text x="195" y="455" text-anchor="end">→ NOMBRE PROTOCOLO</text>
    <line x1="200" y1="500" x2="350" y2="500" stroke="#C6A969" stroke-width="0.6"/>
    <text x="195" y="495" text-anchor="end">→ MOLÉCULA + DOSIS</text>
    <line x1="730" y1="565" x2="880" y2="565" stroke="#C6A969" stroke-width="0.6"/>
    <text x="885" y="560">LOTE TRAZABLE ←</text>
    <line x1="730" y1="605" x2="880" y2="605" stroke="#C6A969" stroke-width="0.6"/>
    <text x="885" y="600">CADUCIDAD ←</text>
  </g>

  <text x="540" y="780" font-family="'Playfair Display',Georgia,serif" font-size="38" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">Sin lote, sin caducidad,</text>
  <text x="540" y="830" font-family="'Playfair Display',Georgia,serif" font-size="38" font-weight="400" fill="url(#gold)" text-anchor="middle" font-style="italic">no es research-grade.</text>

  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">02 / 08</text>
</svg>
