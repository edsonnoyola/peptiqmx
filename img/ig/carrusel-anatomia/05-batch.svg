<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0b07"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C981"/>
      <stop offset="100%" stop-color="#8f7a4d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#C6A969" text-anchor="middle" letter-spacing="10" opacity="0.75">04 · TRAZABILIDAD POR LOTE</text>

  <text x="540" y="240" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">Cada lote tiene</text>
  <text x="540" y="310" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="400" fill="url(#gold)" text-anchor="middle" font-style="italic">un código único.</text>

  <!-- Batch trace flow -->
  <g transform="translate(140 420)">
    <!-- step 1 -->
    <circle cx="60" cy="60" r="50" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <text x="60" y="73" font-family="'Playfair Display',Georgia,serif" font-size="42" fill="#E5C981" text-anchor="middle">1</text>
    <text x="60" y="160" font-family="'Inter',sans-serif" font-size="16" fill="#f0e4c8" text-anchor="middle" letter-spacing="2">SÍNTESIS</text>
    <text x="60" y="185" font-family="'Inter',sans-serif" font-size="12" fill="#a8987a" text-anchor="middle">PTQ-0421</text>

    <line x1="125" y1="60" x2="195" y2="60" stroke="#C6A969" stroke-width="1" opacity="0.5" stroke-dasharray="4 4"/>

    <!-- step 2 -->
    <g transform="translate(195 0)">
      <circle cx="60" cy="60" r="50" fill="none" stroke="url(#gold)" stroke-width="2"/>
      <text x="60" y="73" font-family="'Playfair Display',Georgia,serif" font-size="42" fill="#E5C981" text-anchor="middle">2</text>
      <text x="60" y="160" font-family="'Inter',sans-serif" font-size="16" fill="#f0e4c8" text-anchor="middle" letter-spacing="2">PURIFICACIÓN</text>
      <text x="60" y="185" font-family="'Inter',sans-serif" font-size="12" fill="#a8987a" text-anchor="middle">HPLC</text>
    </g>

    <line x1="320" y1="60" x2="390" y2="60" stroke="#C6A969" stroke-width="1" opacity="0.5" stroke-dasharray="4 4"/>

    <!-- step 3 -->
    <g transform="translate(390 0)">
      <circle cx="60" cy="60" r="50" fill="none" stroke="url(#gold)" stroke-width="2"/>
      <text x="60" y="73" font-family="'Playfair Display',Georgia,serif" font-size="42" fill="#E5C981" text-anchor="middle">3</text>
      <text x="60" y="160" font-family="'Inter',sans-serif" font-size="16" fill="#f0e4c8" text-anchor="middle" letter-spacing="2">3RD PARTY</text>
      <text x="60" y="185" font-family="'Inter',sans-serif" font-size="12" fill="#a8987a" text-anchor="middle">Janoshik</text>
    </g>

    <line x1="515" y1="60" x2="585" y2="60" stroke="#C6A969" stroke-width="1" opacity="0.5" stroke-dasharray="4 4"/>

    <!-- step 4 -->
    <g transform="translate(585 0)">
      <circle cx="60" cy="60" r="50" fill="none" stroke="url(#gold)" stroke-width="2"/>
      <text x="60" y="73" font-family="'Playfair Display',Georgia,serif" font-size="42" fill="#E5C981" text-anchor="middle">4</text>
      <text x="60" y="160" font-family="'Inter',sans-serif" font-size="16" fill="#f0e4c8" text-anchor="middle" letter-spacing="2">LIOFILIZADO</text>
      <text x="60" y="185" font-family="'Inter',sans-serif" font-size="12" fill="#a8987a" text-anchor="middle">VIAL SELLADO</text>
    </g>

    <line x1="710" y1="60" x2="780" y2="60" stroke="#C6A969" stroke-width="1" opacity="0.5" stroke-dasharray="4 4"/>

    <!-- step 5 -->
    <g transform="translate(780 0)">
      <circle cx="60" cy="60" r="50" fill="url(#gold)"/>
      <text x="60" y="73" font-family="'Playfair Display',Georgia,serif" font-size="42" fill="#0e0b07" text-anchor="middle">5</text>
      <text x="60" y="160" font-family="'Inter',sans-serif" font-size="16" fill="#E5C981" text-anchor="middle" letter-spacing="2">TÚ</text>
      <text x="60" y="185" font-family="'Inter',sans-serif" font-size="12" fill="#a8987a" text-anchor="middle">trazable</text>
    </g>
  </g>

  <text x="540" y="780" font-family="'Playfair Display',Georgia,serif" font-size="36" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">Escaneas el QR del vial</text>
  <text x="540" y="830" font-family="'Playfair Display',Georgia,serif" font-size="36" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">y ves toda la cadena.</text>

  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">05 / 08</text>
</svg>
