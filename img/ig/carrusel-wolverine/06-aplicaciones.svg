<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000000" stop-opacity="0.55"/><stop offset="100%" stop-color="#000000" stop-opacity="0.92"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E5C981"/><stop offset="100%" stop-color="#8f7a4d"/></linearGradient>
  </defs>
  <image xlink:href="https://peptiqmx.com/img/covers/wolverine-hero.png" x="0" y="0" width="1080" height="1080" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1080" height="1080" fill="url(#dark)"/>
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#E5C981" text-anchor="middle" letter-spacing="10">05 · DÓNDE SE USA</text>
  <text x="540" y="240" font-family="'Playfair Display',Georgia,serif" font-size="48" fill="#f0e4c8" text-anchor="middle" font-style="italic">Casos donde nada más funcionó:</text>
  <g transform="translate(180 340)" font-family="'Inter',sans-serif" font-size="22" fill="#f0e4c8">
    <text x="0" y="40"><tspan fill="#E5C981">→</tspan> Tendinopatía aquilea crónica</text>
    <text x="0" y="90"><tspan fill="#E5C981">→</tspan> Manguito rotador post-cirugía</text>
    <text x="0" y="140"><tspan fill="#E5C981">→</tspan> Esguinces ligamento cruzado</text>
    <text x="0" y="190"><tspan fill="#E5C981">→</tspan> Síndrome del túnel carpiano</text>
    <text x="0" y="240"><tspan fill="#E5C981">→</tspan> Gastritis crónica · colitis</text>
    <text x="0" y="290"><tspan fill="#E5C981">→</tspan> Recuperación atletas alto nivel</text>
    <text x="0" y="340"><tspan fill="#E5C981">→</tspan> Post-cirugía ortopédica</text>
  </g>
  <text x="540" y="780" font-family="'Playfair Display',Georgia,serif" font-size="32" fill="url(#gold)" text-anchor="middle" font-style="italic">Cuando dijeron "vive con el dolor".</text>
  <text x="540" y="830" font-family="'Playfair Display',Georgia,serif" font-size="32" fill="#f0e4c8" text-anchor="middle" font-style="italic">Wolverine Stack respondió.</text>
  <text x="540" y="900" font-family="'Inter',sans-serif" font-size="14" fill="#a8987a" text-anchor="middle" letter-spacing="2">BPC-157 &amp; TB-500: THE WOLVERINE STACK · CLINICAL CASES</text>
  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">06 / 08</text>
