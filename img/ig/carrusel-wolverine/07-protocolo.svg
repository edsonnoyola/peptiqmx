<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#000000" stop-opacity="0.55"/><stop offset="100%" stop-color="#000000" stop-opacity="0.95"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E5C981"/><stop offset="100%" stop-color="#8f7a4d"/></linearGradient>
  </defs>
  <image xlink:href="https://peptiqmx.com/img/covers/wolverine-hero.png" x="0" y="0" width="1080" height="1080" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1080" height="1080" fill="url(#dark)"/>
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#E5C981" text-anchor="middle" letter-spacing="10">06 · PROTOCOLO WOLVERINE STACK</text>
  <text x="540" y="240" font-family="'Playfair Display',Georgia,serif" font-size="56" fill="#f0e4c8" text-anchor="middle" font-style="italic">4 a 8 semanas. Un vial 20mg.</text>
  <g transform="translate(140 360)">
    <g>
      <rect width="800" height="86" fill="rgba(0,0,0,0.6)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="36" font-family="'Playfair Display',Georgia,serif" font-size="22" fill="#E5C981" font-style="italic">Reconstitución</text>
      <text x="40" y="64" font-family="'Inter',sans-serif" font-size="16" fill="#f0e4c8">2ml agua bact a 20mg = 10 dosis de 2mg</text>
    </g>
    <g transform="translate(0 110)">
      <rect width="800" height="86" fill="rgba(0,0,0,0.6)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="36" font-family="'Playfair Display',Georgia,serif" font-size="22" fill="#E5C981" font-style="italic">Frecuencia</text>
      <text x="40" y="64" font-family="'Inter',sans-serif" font-size="16" fill="#f0e4c8">250mcg BPC + 250mcg TB · 2x día subcutáneo</text>
    </g>
    <g transform="translate(0 220)">
      <rect width="800" height="86" fill="rgba(0,0,0,0.6)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="36" font-family="'Playfair Display',Georgia,serif" font-size="22" fill="#E5C981" font-style="italic">Sitio inyección</text>
      <text x="40" y="64" font-family="'Inter',sans-serif" font-size="16" fill="#f0e4c8">Cerca del tejido lesionado · efecto local + sistémico</text>
    </g>
    <g transform="translate(0 330)">
      <rect width="800" height="86" fill="rgba(0,0,0,0.6)" stroke="url(#gold)" stroke-width="1.2" rx="2"/>
      <text x="40" y="36" font-family="'Playfair Display',Georgia,serif" font-size="22" fill="#E5C981" font-style="italic">Resultado esperado</text>
      <text x="40" y="64" font-family="'Inter',sans-serif" font-size="16" fill="#f0e4c8">Sem 2 inflamación baja · sem 4-6 movilidad · sem 8 fuerza</text>
    </g>
  </g>
  <text x="540" y="900" font-family="'Inter',sans-serif" font-size="18" fill="#E5C981" text-anchor="middle" letter-spacing="4">PROTOCOLO PERSONALIZADO INCLUIDO</text>
  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">07 / 08</text>
</svg>
