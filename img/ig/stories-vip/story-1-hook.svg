<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E0E0E"/>
      <stop offset="50%" stop-color="#1a1416"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B97A"/>
      <stop offset="50%" stop-color="#C6A969"/>
      <stop offset="100%" stop-color="#9F8347"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C6A969" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C6A969" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg1)"/>
  <circle cx="540" cy="700" r="450" fill="url(#goldGlow)"/>

  <!-- Top brand small -->
  <text x="540" y="140" text-anchor="middle" font-family="Playfair Display,Georgia,serif" font-weight="600" font-size="22" fill="#C6A969" letter-spacing="6">PEPTIQ MX</text>
  <line x1="500" y1="160" x2="580" y2="160" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="185" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#888" letter-spacing="4">VIP · ESTA SEMANA</text>

  <!-- Big number scarcity -->
  <text x="540" y="640" text-anchor="middle" font-family="Playfair Display,Georgia,serif" font-weight="600" font-size="380" fill="url(#goldShine)" letter-spacing="-8">50</text>
  <text x="540" y="730" text-anchor="middle" font-family="Inter,sans-serif" font-weight="500" font-size="32" fill="#fff" letter-spacing="6">VIALES</text>
  <text x="540" y="785" text-anchor="middle" font-family="Inter,sans-serif" font-weight="300" font-size="22" fill="#aaa" letter-spacing="5">ASIGNADOS · 4 DÍAS</text>

  <!-- Hairline -->
  <line x1="440" y1="900" x2="640" y2="900" stroke="#C6A969" stroke-width="2" opacity="0.6"/>

  <!-- Hook editorial -->
  <text x="540" y="1010" text-anchor="middle" font-family="Playfair Display,Georgia,serif" font-style="italic" font-weight="500" font-size="58" fill="#fff">No vendemos</text>
  <text x="540" y="1080" text-anchor="middle" font-family="Playfair Display,Georgia,serif" font-style="italic" font-weight="500" font-size="58" fill="#fff">péptidos.</text>
  <text x="540" y="1180" text-anchor="middle" font-family="Playfair Display,Georgia,serif" font-style="italic" font-weight="600" font-size="58" fill="#C6A969">Seleccionamos</text>
  <text x="540" y="1250" text-anchor="middle" font-family="Playfair Display,Georgia,serif" font-style="italic" font-weight="600" font-size="58" fill="#C6A969">a quién admitimos.</text>

  <!-- Sticker zone marker (upper) -->
  <rect x="290" y="1380" width="500" height="160" rx="20" fill="rgba(255,255,255,0.04)" stroke="#444" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="540" y="1450" text-anchor="middle" font-family="Inter,sans-serif" font-size="20" fill="#666" letter-spacing="3">↓ AQUÍ PEGA EL LINK STICKER ↓</text>
  <text x="540" y="1490" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#555" letter-spacing="2">peptiqmx.com/vip</text>

  <!-- Sticker zone (lower - countdown) -->
  <rect x="380" y="1620" width="320" height="120" rx="16" fill="rgba(91,26,31,0.4)" stroke="#5B1A1F" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="540" y="1670" text-anchor="middle" font-family="Inter,sans-serif" font-size="18" fill="#888" letter-spacing="2">↓ COUNTDOWN STICKER ↓</text>
  <text x="540" y="1700" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#555">"Cierre acceso · domingo 11pm"</text>

  <!-- Bottom signature -->
  <text x="540" y="1850" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#666" letter-spacing="6">HACK YOUR LIMITS</text>
</svg>
