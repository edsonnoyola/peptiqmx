<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>Story 1 · auténtica</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Inter:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#222;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:40px 0}
.story{width:540px;height:960px;position:relative;overflow:hidden;background:#000;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.story-img{position:absolute;inset:0;background:url('https://peptiqmx.com/img/covers/highlander-hero.png') center/cover;filter:brightness(0.9)}
.story-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.4) 0%,transparent 30%,transparent 70%,rgba(0,0,0,0.7) 100%)}
.txt-top{position:absolute;top:50px;left:30px;right:30px;z-index:2;text-align:center}
.txt-top span{display:inline-block;background:rgba(255,255,255,0.95);color:#000;padding:8px 16px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;letter-spacing:2px;border-radius:6px;text-transform:uppercase}
.txt-mid{position:absolute;top:130px;left:30px;right:30px;z-index:2;text-align:center}
.txt-mid h1{font-family:'Caveat',cursive;font-size:48px;color:#fff;font-weight:600;text-shadow:0 2px 12px rgba(0,0,0,0.6);line-height:1.1}
.txt-mid p{font-family:'Caveat',cursive;font-size:34px;color:#FFD580;margin-top:10px;text-shadow:0 2px 8px rgba(0,0,0,0.6)}
.txt-bot{position:absolute;bottom:280px;left:30px;right:30px;z-index:2}
.txt-bot p{font-family:'Inter',sans-serif;font-size:18px;color:#fff;font-weight:500;text-shadow:0 1px 6px rgba(0,0,0,0.8);text-align:center;line-height:1.5}
.txt-bot .small{font-size:13px;color:rgba(255,255,255,0.7);margin-top:8px;letter-spacing:1px}

/* Sticker zones */
.sticker-box{position:absolute;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);border:2px dashed #FFD580;border-radius:12px;padding:14px 20px;text-align:center;z-index:3}
.sticker-box .lbl{color:#FFD580;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.sticker-box .desc{color:#aaa;font-size:10px;margin-top:4px;font-family:'Inter',sans-serif}
.sticker-link{bottom:160px;width:280px}
.sticker-time{bottom:80px;width:180px;background:rgba(91,26,31,0.6);border-color:#fff}

/* Mock IG header */
.ig-header{position:absolute;top:14px;left:14px;right:14px;z-index:5;display:flex;align-items:center;gap:10px}
.ig-pic{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#C6A969,#5B1A1F);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Playfair Display';font-weight:600;font-size:18px}
.ig-name{color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.ig-time{color:rgba(255,255,255,0.7);font-size:11px}
</style>
  <script src="/peptiq-legal-banner.js" defer></script>
    <script defer src="/peptiq-age-gate.js?v=2"></script>
</head>
<body>
<div class="story">
  <div class="story-img"></div>

  <div class="ig-header">
    <div class="ig-pic">P</div>
    <div>
      <div class="ig-name">peptiqmx</div>
      <div class="ig-time">ahora · 🔒 Best friends</div>
    </div>
  </div>

  <div class="txt-mid" style="top:200px">
    <h1>solo por esta semana</h1>
    <p>↓ acceso VIP ↓</p>
  </div>

  <div class="txt-bot">
    <p>50 viales del Highlander Stack.<br>Cuando se acaben, lista de espera.</p>
    <div class="small">peptiqmx.com/vip</div>
  </div>

  <div class="sticker-box sticker-link">
    <div class="lbl">↓ LINK STICKER ↓</div>
    <div class="desc">URL: peptiqmx.com/vip<br>Texto: "Acceso VIP"</div>
  </div>

  <div class="sticker-box sticker-time">
    <div class="lbl">⏱ COUNTDOWN</div>
    <div class="desc">Hasta domingo 11pm</div>
  </div>
</div>
</body>
</html>
