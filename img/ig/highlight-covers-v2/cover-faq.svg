<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <filter id="neon-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="30" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0805"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <circle cx="540" cy="540" r="430" fill="none" stroke="#E5C981" stroke-width="5" filter="url(#neon-gold)" opacity="0.9"/>

  <!-- Giant question mark, gold neon -->
  <g filter="url(#neon-gold)">
    <text x="540" y="720" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="560" font-weight="800" text-anchor="middle" fill="#f0e4c8" stroke="#E5C981" stroke-width="3">?</text>
  </g>
</svg>
