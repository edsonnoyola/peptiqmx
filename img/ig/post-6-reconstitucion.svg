<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0b07"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C981"/>
      <stop offset="50%" stop-color="#C6A969"/>
      <stop offset="100%" stop-color="#8f7a4d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Header -->
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="140" font-family="'Inter', sans-serif" font-size="22" fill="#C6A969" text-anchor="middle" letter-spacing="14" opacity="0.75">PROTOCOLO · GUÍA RÁPIDA</text>

  <!-- Title -->
  <text x="540" y="260" font-family="'Playfair Display', Georgia, serif" font-size="88" font-weight="500" fill="url(#gold)" text-anchor="middle" font-style="italic">Reconstitución</text>

  <line x1="430" y1="310" x2="650" y2="310" stroke="#C6A969" stroke-width="1" opacity="0.55"/>

  <!-- Steps -->
  <g font-family="'Inter', sans-serif" fill="#e8dcc0">
    <!-- Step 1 -->
    <g transform="translate(130 430)">
      <circle cx="0" cy="-10" r="40" fill="none" stroke="url(#gold)" stroke-width="2"/>
      <text x="0" y="5" font-family="'Playfair Display', serif" font-size="48" fill="url(#gold)" text-anchor="middle" font-weight="500">1</text>
      <text x="80" y="-30" font-size="34" font-weight="600">Agua bacteriostática</text>
      <text x="80" y="10" font-size="28" fill="#a8987a">1 ml por vial de 10 mg (ej. BPC-157)</text>
    </g>
    <!-- Step 2 -->
    <g transform="translate(130 570)">
      <circle cx="0" cy="-10" r="40" fill="none" stroke="url(#gold)" stroke-width="2"/>
      <text x="0" y="5" font-family="'Playfair Display', serif" font-size="48" fill="url(#gold)" text-anchor="middle" font-weight="500">2</text>
      <text x="80" y="-30" font-size="34" font-weight="600">Inyectar lento en pared del vial</text>
      <text x="80" y="10" font-size="28" fill="#a8987a">Sin disparar directo al polvo. Sin agitar.</text>
    </g>
    <!-- Step 3 -->
    <g transform="translate(130 710)">
      <circle cx="0" cy="-10" r="40" fill="none" stroke="url(#gold)" stroke-width="2"/>
      <text x="0" y="5" font-family="'Playfair Display', serif" font-size="48" fill="url(#gold)" text-anchor="middle" font-weight="500">3</text>
      <text x="80" y="-30" font-size="34" font-weight="600">Rotar suave entre las manos</text>
      <text x="80" y="10" font-size="28" fill="#a8987a">Se disuelve en segundos. Solución cristalina.</text>
    </g>
    <!-- Step 4 -->
    <g transform="translate(130 850)">
      <circle cx="0" cy="-10" r="40" fill="none" stroke="url(#gold)" stroke-width="2"/>
      <text x="0" y="5" font-family="'Playfair Display', serif" font-size="48" fill="url(#gold)" text-anchor="middle" font-weight="500">4</text>
      <text x="80" y="-30" font-size="34" font-weight="600">Refrigerar · usar en 28 días</text>
      <text x="80" y="10" font-size="28" fill="#a8987a">Jeringa de insulina. 10-20 UI = dosis típica.</text>
    </g>
  </g>

  <!-- Bottom -->
  <line x1="80" y1="980" x2="1000" y2="980" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="1020" font-family="'Inter', sans-serif" font-size="26" font-weight="600" fill="url(#gold)" text-anchor="middle" letter-spacing="10">GUARDA ESTE POST · PEPTIQMX.COM</text>
</svg>
