<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="redOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a0606" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <image xlink:href="https://peptiqmx.com/img/covers/prime-hero.png" x="0" y="0" width="1080" height="1080" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1080" height="1080" fill="url(#redOverlay)"/>

  <line x1="80" y1="100" x2="1000" y2="100" stroke="#b53d3d" stroke-width="1" opacity="0.7"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#ff7878" text-anchor="middle" letter-spacing="10">02 · HORMONAS SINTÉTICAS</text>

  <text x="540" y="280" font-family="'Inter',sans-serif" font-size="22" fill="#a8987a" text-anchor="middle" letter-spacing="6">EL REEMPLAZO</text>
  <text x="540" y="420" font-family="'Playfair Display',Georgia,serif" font-size="92" font-weight="500" fill="#ff5050" text-anchor="middle" font-style="italic">Apagan tu sistema.</text>

  <line x1="420" y1="480" x2="660" y2="480" stroke="#b53d3d" stroke-width="1" opacity="0.7"/>

  <g transform="translate(140 550)" font-family="'Inter',sans-serif">
    <g>
      <rect width="800" height="76" fill="rgba(0,0,0,0.55)" stroke="#b53d3d" stroke-width="1.2" rx="2"/>
      <text x="40" y="36" font-size="14" fill="#ff7878" letter-spacing="3">MECANISMO</text>
      <text x="40" y="62" font-size="20" fill="#f0e4c8">Sustituyen producción natural del cuerpo.</text>
    </g>
    <g transform="translate(0 95)">
      <rect width="800" height="76" fill="rgba(0,0,0,0.55)" stroke="#b53d3d" stroke-width="1.2" rx="2"/>
      <text x="40" y="36" font-size="14" fill="#ff7878" letter-spacing="3">EFECTO</text>
      <text x="40" y="62" font-size="20" fill="#f0e4c8">Sistema endógeno se apaga (shut down).</text>
    </g>
    <g transform="translate(0 190)">
      <rect width="800" height="76" fill="rgba(0,0,0,0.55)" stroke="#b53d3d" stroke-width="1.2" rx="2"/>
      <text x="40" y="36" font-size="14" fill="#ff7878" letter-spacing="3">RIESGO</text>
      <text x="40" y="62" font-size="20" fill="#f0e4c8">Dependencia + efectos secundarios sistémicos.</text>
    </g>
