  <text x="540" y="920" font-family="'Inter',sans-serif" font-size="16" fill="#a8987a" text-anchor="middle" letter-spacing="4">EJ. TESTOSTERONA EXÓGENA · GH RECOMBINANTE</text>

  <line x1="80" y1="990" x2="1000" y2="990" stroke="#b53d3d" stroke-width="1" opacity="0.7"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">03 / 08</text>
