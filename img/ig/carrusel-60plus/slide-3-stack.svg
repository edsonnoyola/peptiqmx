<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B1A1F"/>
      <stop offset="100%" stop-color="#3a1014"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4B97A"/>
      <stop offset="100%" stop-color="#C6A969"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg3)"/>

  <!-- Eyebrow -->
  <text x="540" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#C6A969" letter-spacing="6">03 · LONGEVITY STACK</text>

