  <text x="540" y="1245" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#C6A969" letter-spacing="2">COA JANOSHIK PÚBLICO POR LOTE</text>
  <text x="540" y="1300" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-size="20" font-weight="600" fill="#C6A969" letter-spacing="6">PEPTIQ MX</text>
