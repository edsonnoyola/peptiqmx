    <text x="40" y="455" font-family="Playfair Display, Georgia, serif" font-size="36" font-weight="600" fill="#C6A969">GHK-Cu 100mg</text>
    <text x="40" y="490" font-family="Inter, sans-serif" font-size="16" fill="#fff" letter-spacing="2">REGENERACIÓN CELULAR</text>
    <text x="40" y="535" font-family="Inter, sans-serif" font-size="22" fill="#ddd">1-2mg/noche · 30 días on / 30 off</text>
    <text x="880" y="460" text-anchor="end" font-family="Playfair Display, Georgia, serif" font-size="32" font-weight="600" fill="#fff">$3,799</text>
