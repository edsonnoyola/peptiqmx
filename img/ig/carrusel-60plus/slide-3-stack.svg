  <text x="540" y="280" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="600" fill="#fff">El protocolo</text>
  <text x="540" y="360" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="600" fill="url(#g3)" font-style="italic">de los próximos</text>
  <text x="540" y="440" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="600" fill="url(#g3)" font-style="italic">20 años</text>

  <!-- 3 stack cards -->
  <g transform="translate(80,560)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="920" height="170" rx="3" fill="rgba(255,255,255,0.06)" stroke="#C6A969" stroke-width="1"/>
    <text x="40" y="55" font-family="Playfair Display, Georgia, serif" font-size="36" font-weight="600" fill="#C6A969">NAD+ 1000mg</text>
    <text x="40" y="90" font-family="Inter, sans-serif" font-size="16" fill="#fff" letter-spacing="2">ENERGÍA MITOCONDRIAL</text>
    <text x="40" y="135" font-family="Inter, sans-serif" font-size="22" fill="#ddd">100-250mg/día · 8-12 sem on / 4 off</text>
    <text x="880" y="60" text-anchor="end" font-family="Playfair Display, Georgia, serif" font-size="32" font-weight="600" fill="#fff">$5,499</text>

    <!-- Card 2 -->
    <rect x="0" y="200" width="920" height="170" rx="3" fill="rgba(255,255,255,0.06)" stroke="#C6A969" stroke-width="1"/>
    <text x="40" y="255" font-family="Playfair Display, Georgia, serif" font-size="36" font-weight="600" fill="#C6A969">Epithalon 50mg</text>
    <text x="40" y="290" font-family="Inter, sans-serif" font-size="16" fill="#fff" letter-spacing="2">TELÓMEROS · MELATONINA</text>
    <text x="40" y="335" font-family="Inter, sans-serif" font-size="22" fill="#ddd">5-10mg/noche · 10 días · 3x al año</text>
    <text x="880" y="260" text-anchor="end" font-family="Playfair Display, Georgia, serif" font-size="32" font-weight="600" fill="#fff">$6,799</text>

