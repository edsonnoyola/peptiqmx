  <text x="540" y="640" font-family="'Playfair Display',Georgia,serif" font-size="38" fill="url(#gold)" text-anchor="middle" font-style="italic">El resultado se ve en 8-12 semanas:</text>

  <g transform="translate(180 720)" font-family="'Inter',sans-serif" font-size="22" fill="#f0e4c8">
    <text x="0" y="40">→ Recomposición corporal real</text>
    <text x="0" y="85">→ Sueño profundo Fase 3-4 REM</text>
    <text x="0" y="130">→ Recuperación 40% más rápida</text>
  </g>

  <text x="540" y="930" font-family="'Inter',sans-serif" font-size="14" fill="#a8987a" text-anchor="middle" letter-spacing="2">FALUTZ NEJM 2007 · GH SECRETAGOG STUDIES</text>
  <line x1="80" y1="990" x2="1000" y2="990" stroke="#C6A969" stroke-width="1" opacity="0.5"/>
  <text x="540" y="1035" font-family="'Inter',sans-serif" font-size="20" fill="#a8987a" text-anchor="middle" letter-spacing="8">06 / 08</text>
