  <line x1="420" y1="490" x2="660" y2="490" stroke="#C6A969" stroke-width="1" opacity="0.7"/>
  <text x="540" y="600" font-family="'Playfair Display',Georgia,serif" font-size="36" fill="#f0e4c8" text-anchor="middle" font-style="italic">La pituitaria está cansada.</text>
  <text x="540" y="660" font-family="'Playfair Display',Georgia,serif" font-size="36" fill="#f0e4c8" text-anchor="middle" font-style="italic">Los pulsos naturales bajan en</text>
  <text x="540" y="730" font-family="'Playfair Display',Georgia,serif" font-size="36" fill="url(#gold)" text-anchor="middle" font-style="italic">volumen y frecuencia.</text>
  <text x="540" y="850" font-family="'Inter',sans-serif" font-size="20" fill="#E5C981" text-anchor="middle" letter-spacing="4">→ MENOS RECUPERACIÓN · MÁS GRASA · MENOS MASA</text>
