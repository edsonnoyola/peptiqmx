      <text x="100" y="50" font-size="22" fill="#f0e4c8">Jeringa insulínica 1ml</text>
      <text x="600" y="50" font-size="16" fill="#a8987a" letter-spacing="2">100 unidades · BD</text>
    </g>
    <g transform="translate(0 300)">
