<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0e0b07"/><stop offset="100%" stop-color="#000000"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E5C981"/><stop offset="100%" stop-color="#8f7a4d"/></linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#C6A969" text-anchor="middle" letter-spacing="10" opacity="0.75">01 · LO QUE NECESITAS</text>

  <text x="540" y="240" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">Cinco piezas.</text>

  <g transform="translate(140 340)" font-family="'Inter',sans-serif">
    <g>
      <rect width="800" height="80" fill="none" stroke="url(#gold)" stroke-width="1.5" rx="2"/>
      <text x="40" y="50" font-family="'Playfair Display',Georgia,serif" font-size="24" fill="#E5C981" font-style="italic">01.</text>
      <text x="100" y="50" font-size="22" fill="#f0e4c8">Vial péptido liofilizado</text>
      <text x="600" y="50" font-size="16" fill="#a8987a" letter-spacing="2">PEPTIQ · 10mg</text>
    </g>
    <g transform="translate(0 100)">
