      <text x="100" y="50" font-size="22" fill="#f0e4c8">Agua bacteriostática</text>
      <text x="600" y="50" font-size="16" fill="#a8987a" letter-spacing="2">3-5ml · alcohol bencílico</text>
    </g>
    <g transform="translate(0 200)">
