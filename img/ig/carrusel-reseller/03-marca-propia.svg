    <g>
      <rect width="800" height="86" fill="none" stroke="url(#gold)" stroke-width="1.5" rx="2"/>
      <text x="40" y="38" fill="#E5C981" font-family="'Playfair Display',Georgia,serif" font-size="22" font-style="italic">Una marca · un estándar</text>
      <text x="40" y="68" letter-spacing="1" fill="#d4c8a8">Selección directa del laboratorio sintetizador.</text>
