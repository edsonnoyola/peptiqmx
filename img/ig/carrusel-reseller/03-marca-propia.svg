  <rect width="1080" height="1080" fill="url(#bg)"/>
  <line x1="80" y1="100" x2="1000" y2="100" stroke="#C6A969" stroke-width="1" opacity="0.4"/>
  <text x="540" y="142" font-family="'Inter',sans-serif" font-size="20" fill="#C6A969" text-anchor="middle" letter-spacing="10" opacity="0.75">02 · ¿QUÉ ES MARCA PROPIA?</text>

  <text x="540" y="240" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="400" fill="#f0e4c8" text-anchor="middle" font-style="italic">Diseña la molécula.</text>
  <text x="540" y="310" font-family="'Playfair Display',Georgia,serif" font-size="62" font-weight="400" fill="url(#gold)" text-anchor="middle" font-style="italic">Controla cada paso.</text>

