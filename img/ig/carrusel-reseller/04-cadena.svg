      <text x="220" y="135" text-anchor="middle" letter-spacing="2">LAB SELECCIONADO + AUDIT</text>
      <line x1="220" y1="170" x2="220" y2="200" stroke="#C6A969" stroke-width="1"/>

      <rect x="60" y="200" width="320" height="60" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
      <text x="220" y="235" text-anchor="middle" letter-spacing="2">JANOSHIK · 3RD PARTY</text>
