      <text x="220" y="135" text-anchor="middle" letter-spacing="2">FÁBRICA CHINA GENÉRICA</text>
      <line x1="220" y1="170" x2="220" y2="200" stroke="#3a2a1a" stroke-width="1" stroke-dasharray="4 4"/>
