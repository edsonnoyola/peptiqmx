      <rect x="60" y="200" width="320" height="60" fill="none" stroke="#3a2a1a" stroke-width="1"/>
      <text x="220" y="235" text-anchor="middle" letter-spacing="2">DISTRIBUIDOR US/MX</text>
      <line x1="220" y1="270" x2="220" y2="300" stroke="#3a2a1a" stroke-width="1" stroke-dasharray="4 4"/>

      <rect x="60" y="300" width="320" height="60" fill="none" stroke="#3a2a1a" stroke-width="1"/>
      <text x="220" y="335" text-anchor="middle" letter-spacing="2">RESELLER MX (SHOPIFY)</text>
      <line x1="220" y1="370" x2="220" y2="400" stroke="#3a2a1a" stroke-width="1" stroke-dasharray="4 4"/>

      <rect x="60" y="400" width="320" height="60" fill="none" stroke="#3a2a1a" stroke-width="1"/>
      <text x="220" y="435" text-anchor="middle" letter-spacing="2">TÚ</text>

      <text x="220" y="510" text-anchor="middle" font-size="14" letter-spacing="2">4 PASOS · 0 TRAZABILIDAD</text>
    </g>
  </g>

  <!-- RIGHT — Marca propia chain -->
  <g transform="translate(620 220)">
    <text x="220" y="40" font-family="'Playfair Display',Georgia,serif" font-size="22" fill="#E5C981" text-anchor="middle" letter-spacing="6" font-style="italic">PEPTIQ</text>
    <line x1="170" y1="60" x2="270" y2="60" stroke="url(#gold)" stroke-width="0.8"/>

