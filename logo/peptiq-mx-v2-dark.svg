<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
  <!-- V2: PEPTIQ con X grande cruzada como icono -->
  <rect width="600" height="180" fill="#1A1A1A"/>

  <!-- X grande decorativa detrás — watermark sutil -->
  <text x="420" y="145" font-family="Georgia, serif" font-size="180" font-weight="700" fill="#C4A265" opacity="0.12">X</text>

  <!-- PEPTIQ -->
  <text x="40" y="100" font-family="Georgia, 'Playfair Display', serif" font-size="68" font-weight="400" fill="#FFFFFF" letter-spacing="10">PEPTIQ</text>

  <!-- Línea divisora gold -->
  <line x1="40" y1="115" x2="180" y2="115" stroke="#C4A265" stroke-width="1.5"/>

  <!-- MX debajo, más pequeño -->
  <text x="42" y="145" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="18" fill="#C4A265" letter-spacing="12" font-weight="600">M E X I C O</text>

  <!-- Tagline -->
  <text x="42" y="168" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="9" fill="#6B6B6B" letter-spacing="3.5">ADVANCED SCIENCE FOR LIMITLESS LIVING</text>
</svg>