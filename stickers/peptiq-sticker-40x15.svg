<?xml version="1.0" encoding="UTF-8"?>
<!-- PEPTIQ MX · Sticker box-top 40×15mm · Black matte + gold foil -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="40mm" height="15mm"
     viewBox="0 0 400 150"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&amp;family=Inter:wght@500&amp;display=swap');
      .brand{font-family:'Playfair Display',Georgia,serif;font-weight:600;fill:#C6A969;letter-spacing:14px}
      .tagline{font-family:'Inter',Arial,sans-serif;font-weight:500;fill:#C6A969;letter-spacing:6px;text-transform:uppercase}
      .rule{stroke:#C6A969;stroke-width:1;fill:none}
    </style>
    <!-- Subtle gradient to mimic foil shine on screen preview -->
    <linearGradient id="foil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B97A"/>
      <stop offset="50%" stop-color="#C6A969"/>
      <stop offset="100%" stop-color="#9F8347"/>
    </linearGradient>
  </defs>

  <!-- Black matte base (the sticker material itself) -->
  <rect width="400" height="150" rx="3" fill="#0E0E0E"/>

  <!-- PEPTIQ wordmark · gold foil -->
  <text x="200" y="78" text-anchor="middle" class="brand" font-size="48" fill="url(#foil)">PEPTIQ</text>

  <!-- Hairline rule -->
  <line x1="160" y1="92" x2="240" y2="92" class="rule" opacity="0.7"/>

  <!-- Tagline · gold -->
  <text x="200" y="115" text-anchor="middle" class="tagline" font-size="11" fill="url(#foil)">HACK YOUR LIMITS</text>
</svg>
