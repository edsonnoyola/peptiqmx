      { value: 'hipertrofia',    emoji: '💪', label: 'Hipertrofia y masa muscular',      desc: 'GH endógeno · recomposición · post-entreno' },
      { value: 'libido',         emoji: '🔥', label: 'Libido y función sexual',          desc: 'PT-141 · kisspeptin · vitalidad masculina/femenina' },

    // P2 · Síntomas (multi-select)
    { type: 'option-multi', key: 'sintomas', eyebrow: 'Pregunta 2 de 7', title: '¿Cuáles de estos describes en ti hoy?', sub: 'Puedes seleccionar varias. Mientras más precisas, mejor el reporte.', options: [
      { value: 'baja_energia',   emoji: '🪫', label: 'Baja energía / fatiga crónica' },
      { value: 'mal_sueno',      emoji: '😴', label: 'Despierto cansado · sueño fragmentado' },
      { value: 'aumento_peso',   emoji: '⚖️', label: 'Subí de peso difícil de bajar' },
      { value: 'dolor_articular',emoji: '🦴', label: 'Dolor articular o muscular crónico' },
      { value: 'piel_arrugas',   emoji: '🪞', label: 'Piel pierde firmeza · arrugas marcadas' },

    { type: 'slider', key: 'salud_actual', eyebrow: 'Pregunta 3 de 7', title: '¿Cómo evalúas tu energía y vitalidad actual?', sub: '0 = me siento agotado todo el tiempo · 10 = excelente, lleno de energía',

    { type: 'option-single', key: 'edad', eyebrow: 'Pregunta 4 de 7', title: '¿En qué rango de edad estás?', sub: 'Algunos protocolos cambian según la etapa biológica.', options: [
      { value: '<35',     emoji: '·', label: 'Menor de 35 años' },
      { value: '35-44',   emoji: '·', label: '35 - 44 años' },

    // P5 · Género
    { type: 'option-single', key: 'genero', eyebrow: 'Pregunta 5 de 7', title: '¿Con qué género te identificas?', sub: 'Algunos protocolos son específicos (menopausia, TRT, libido).', options: [

    { type: 'option-single', key: 'experiencia', eyebrow: 'Pregunta 6 de 7', title: '¿Cuál es tu experiencia con compuestos research-grade?', options: [
      { value: 'novato',        emoji: '🌱', label: 'Es la primera vez que investigo',                 desc: 'Quiero entender lo básico antes de elegir' },
      { value: 'investigando',  emoji: '📚', label: 'En fase de investigación',                       desc: 'He leído pero no he probado' },

      { value: 'avanzado',      emoji: '🎯', label: 'Usuario avanzado · busco protocolos complejos',  desc: 'Stacks combinados, dosing optimizado' },
      { value: 'profesional',   emoji: '🩺', label: 'Profesional de salud o clínica',                 desc: 'Médico · naturópata · nutriólogo · biohacker pro' },
    ]},

    // P7 · Presupuesto
    { type: 'option-single', key: 'presupuesto', eyebrow: 'Pregunta 7 de 7', title: '¿Cuál es tu presupuesto mensual estimado?', sub: 'Esto define el tipo de protocolo recomendado · sin compromiso de compra.', options: [
      { value: 'menos_5k',  emoji: '·', label: 'Menos de $5,000 MXN',  desc: 'Protocolo individual básico · 1 vial' },
      { value: '5k_10k',    emoji: '·', label: '$5,000 - $10,000 MXN', desc: 'Stack intermedio · 2-3 viales' },
      { value: '10k_20k',   emoji: '·', label: '$10,000 - $20,000 MXN',desc: 'Protocolo completo Elite · stack premium' },
      { value: 'mas_20k',   emoji: '·', label: 'Más de $20,000 MXN',   desc: 'Protocolo APEX · multi-system clínica privada' },
      { value: 'evaluando', emoji: '·', label: 'Aún evaluando',         desc: 'Solo quiero información por ahora' },
    ]},

    { type: 'contact' },
    { type: 'result' },
  ]
};

const state = {
  currentStep: 0,
  answers: { sintomas: [] },
  contact: { name: '', phone: '', email: '' },
};

const totalQuestions = QUIZ.steps.filter(s => s.type !== 'intro' && s.type !== 'result' && s.type !== 'contact').length;

function renderProgress(){
  const realStep = state.currentStep === 0 ? 0 :
    QUIZ.steps[state.currentStep].type === 'result' ? totalQuestions + 1 :
    QUIZ.steps[state.currentStep].type === 'contact' ? totalQuestions :
    state.currentStep;
  const pct = (realStep / (totalQuestions + 1)) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  const counter = document.getElementById('stepCounter');
  if (state.currentStep === 0) counter.style.display = 'none';
  else if (QUIZ.steps[state.currentStep].type === 'result') counter.style.display = 'none';
  else {
    counter.style.display = 'block';
    counter.textContent = QUIZ.steps[state.currentStep].type === 'contact'
      ? 'Datos de contacto'
      : `Paso ${state.currentStep} de ${totalQuestions}`;
  }
}

function next(){
  state.currentStep = Math.min(state.currentStep + 1, QUIZ.steps.length - 1);
  render();
}
function back(){
  state.currentStep = Math.max(state.currentStep - 1, 0);
  render();
}

function selectSingle(key, value){
  state.answers[key] = value;
  setTimeout(next, 200);
}
function toggleMulti(key, value){
  if (!state.answers[key]) state.answers[key] = [];
  const idx = state.answers[key].indexOf(value);
  if (idx >= 0) state.answers[key].splice(idx, 1);
  else state.answers[key].push(value);
  // Si selecciona "ninguno" deselecciona todo lo demás
  if (value === 'ninguno' && state.answers[key].includes('ninguno')) {
    state.answers[key] = ['ninguno'];
  } else if (value !== 'ninguno') {

function render(){

async function submitQuiz(){
  const name = document.getElementById('qName').value.trim();
  const phone = document.getElementById('qPhone').value.replace(/\D/g,'').trim();
  const email = document.getElementById('qEmail').value.trim();
  const btn = document.getElementById('submitBtn');
  if (!name || phone.length < 10 || !email.includes('@')) {
    alert('Completa nombre, WhatsApp (10 dígitos) y email válido.');
    return;
  }
  state.contact = { name, phone, email };
  btn.disabled = true; btn.textContent = 'Enviando...';
  try{
    const payload = {
      name, phone, email,
      answers: state.answers,
      utm: {
        source: new URLSearchParams(location.search).get('utm_source') || '',
        medium: new URLSearchParams(location.search).get('utm_medium') || '',
        campaign: new URLSearchParams(location.search).get('utm_campaign') || '',
      },
      submittedAt: new Date().toISOString(),
    };
    await fetch('/api/quiz-submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    // ═══ Track Lead conversion en TODOS los canales ═══
    try {
      // Meta Pixel
      if (window.fbq) fbq('track', 'Lead', {
        content_name: 'PEPTIQ Evaluation',
        content_category: payload.answers?.objetivo || 'longevity',
        value: 500.0,
        currency: 'MXN'
      });
      // Google Ads conversion · reemplaza AW-CONVERSION_ID/CONVERSION_LABEL con valores reales
      if (window.gtag) {
        gtag('event', 'conversion', {
          'send_to': 'AW-CONVERSION_ID/CONVERSION_LABEL',
          'value': 500.0,
          'currency': 'MXN',
          'transaction_id': payload.id || ''
        });
        // GA4 evento custom también
        gtag('event', 'generate_lead', {
          'currency': 'MXN',
          'value': 500.0,
          'objetivo': payload.answers?.objetivo || 'unknown'
        });
      }
      // TikTok Pixel
      if (window.ttq) ttq.track('SubmitForm', {
        content_name: 'PEPTIQ Evaluation',
        value: 500.0,
        currency: 'MXN'
      });
    } catch(e) { console.warn('Pixel tracking error:', e); }
    next();
  }catch(e){
    btn.disabled = false; btn.textContent = 'Recibir mi reporte personalizado →';
    alert('Error de red. Intenta de nuevo.');
  }
}
