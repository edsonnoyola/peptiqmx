<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="1200" height="1200">
  <!-- PEPTIQ MX Box Label — Back side / 75mm x 75mm -->
  <defs>
    <linearGradient id="holoBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4A265;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#E8D5A8;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#C4A265;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F0E6CC;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="300" height="300" fill="#FFFFFF"/>

  <!-- Gold border -->
  <rect x="4" y="4" width="292" height="292" fill="none" stroke="#C4A265" stroke-width="1"/>

  <!-- Top holographic bar -->
  <rect x="4" y="4" width="292" height="8" fill="url(#holoBox)"/>

  <!-- PEPTIQ MX logo -->
  <text x="150" y="40" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A1A1A" text-anchor="middle" letter-spacing="3">PEPTIQ</text>
  <text x="212" y="32" font-family="Georgia, serif" font-size="10" font-weight="500" fill="#C4A265">MX</text>
  <text x="150" y="54" font-family="'Inter', sans-serif" font-size="7" fill="#999" text-anchor="middle" letter-spacing="3">PREMIUM WELLNESS</text>

  <!-- Gold line -->
  <line x1="40" y1="64" x2="260" y2="64" stroke="#C4A265" stroke-width="0.5"/>

  <!-- Product info -->
  <text x="150" y="84" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#1A1A1A" text-anchor="middle">BPC-157</text>
  <text x="150" y="98" font-family="'Inter', sans-serif" font-size="10" fill="#666" text-anchor="middle">10mg / Lyophilized Powder</text>

  <!-- Contents -->
  <text x="30" y="124" font-family="'Inter', sans-serif" font-size="7" font-weight="600" fill="#1A1A1A" letter-spacing="1.5">CONTENIDO:</text>
  <text x="30" y="138" font-family="'Inter', sans-serif" font-size="7" fill="#666">1x Vial BPC-157 10mg liofilizado</text>
  <text x="30" y="150" font-family="'Inter', sans-serif" font-size="7" fill="#666">1x Agua bacteriostatica 10ml USP</text>
  <text x="30" y="162" font-family="'Inter', sans-serif" font-size="7" fill="#666">1x Guia de reconstitucion</text>
  <text x="30" y="174" font-family="'Inter', sans-serif" font-size="7" fill="#666">1x Certificado de Analisis (COA)</text>

  <!-- Storage -->
  <text x="30" y="196" font-family="'Inter', sans-serif" font-size="7" font-weight="600" fill="#1A1A1A" letter-spacing="1.5">ALMACENAMIENTO:</text>
  <text x="30" y="208" font-family="'Inter', sans-serif" font-size="7" fill="#666">Refrigerar 2-8C. Proteger de la luz.</text>
  <text x="30" y="220" font-family="'Inter', sans-serif" font-size="7" fill="#666">Una vez reconstituido, usar dentro de 28 dias.</text>

  <!-- Gold line -->
  <line x1="30" y1="232" x2="270" y2="232" stroke="#C4A265" stroke-width="0.3"/>

  <!-- Legal disclaimer -->
  <text x="150" y="246" font-family="'Inter', sans-serif" font-size="5.5" font-weight="700" fill="#C4A265" text-anchor="middle" letter-spacing="1">FOR RESEARCH USE ONLY</text>
  <text x="150" y="256" font-family="'Inter', sans-serif" font-size="4.5" fill="#999" text-anchor="middle">Not for human or animal consumption.</text>
  <text x="150" y="264" font-family="'Inter', sans-serif" font-size="4.5" fill="#999" text-anchor="middle">The buyer assumes full responsibility for</text>
  <text x="150" y="272" font-family="'Inter', sans-serif" font-size="4.5" fill="#999" text-anchor="middle">safe handling per applicable regulations.</text>

  <!-- Bottom info -->
  <text x="150" y="288" font-family="'Inter', sans-serif" font-size="5" fill="#C4A265" text-anchor="middle" letter-spacing="1">peptiqmx.com | contacto@peptiqmx.com</text>

  <!-- Bottom holographic bar -->
  <rect x="4" y="288" width="292" height="8" fill="url(#holoBox)"/>

  <!-- Holographic seal -->
  <circle cx="255" y="100" r="18" fill="none" stroke="url(#holoBox)" stroke-width="1.5"/>
  <text x="255" y="97" font-family="Georgia, serif" font-size="7" fill="#C4A265" text-anchor="middle" font-weight="700">COA</text>
  <text x="255" y="106" font-family="'Inter', sans-serif" font-size="4.5" fill="#C4A265" text-anchor="middle">VERIFIED</text>

  <!-- QR code placeholder -->
  <rect x="230" y="192" width="40" height="40" fill="#F5F3F0" stroke="#E0DCD8" stroke-width="0.5" rx="2"/>
  <text x="250" y="215" font-family="'Inter', sans-serif" font-size="5" fill="#999" text-anchor="middle">QR CODE</text>
  <text x="250" y="238" font-family="'Inter', sans-serif" font-size="4" fill="#999" text-anchor="middle">Escanea para</text>
  <text x="250" y="245" font-family="'Inter', sans-serif" font-size="4" fill="#999" text-anchor="middle">verificar COA</text>
</svg>