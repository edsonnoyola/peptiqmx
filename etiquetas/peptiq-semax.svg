<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="800" height="480">
  <!-- PEPTIQ MX Vial Label — 50mm x 30mm -->
  <defs>
    <linearGradient id="holo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4A265;stop-opacity:1"/>
      <stop offset="25%" style="stop-color:#E8D5A8;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#C4A265;stop-opacity:1"/>
      <stop offset="75%" style="stop-color:#F0E6CC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C4A265;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="holoStripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C4A265;stop-opacity:0.3"/>
      <stop offset="20%" style="stop-color:#E8D5A8;stop-opacity:0.6"/>
      <stop offset="40%" style="stop-color:#D4B87A;stop-opacity:0.3"/>
      <stop offset="60%" style="stop-color:#F0E6CC;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#C4A265;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#E8D5A8;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="200" height="120" fill="#FFFFFF" rx="2"/>

  <!-- Top holographic stripe -->
  <rect x="0" y="0" width="200" height="3" fill="url(#holo)"/>

  <!-- Bottom holographic stripe -->
  <rect x="0" y="117" width="200" height="3" fill="url(#holo)"/>

  <!-- Holographic security strip (left side) -->
  <rect x="0" y="0" width="6" height="120" fill="url(#holoStripe)" opacity="0.7"/>

  <!-- PEPTIQ MX logo -->
  <text x="100" y="22" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle" letter-spacing="2">PEPTIQ</text>
  <text x="148" y="16" font-family="Georgia, serif" font-size="7" font-weight="500" fill="#C4A265" letter-spacing="0.5">MX</text>

  <!-- Thin gold line -->
  <line x1="30" y1="28" x2="170" y2="28" stroke="#C4A265" stroke-width="0.5"/>

  <!-- Product name -->
  <text x="100" y="52" font-family="'Inter', Helvetica, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">Semax</text>

  <!-- Dosage -->
  <text x="100" y="66" font-family="'Inter', Helvetica, sans-serif" font-size="11" font-weight="400" fill="#666666" text-anchor="middle">10mg / vial</text>

  <!-- Thin gold line -->
  <line x1="30" y1="73" x2="170" y2="73" stroke="#C4A265" stroke-width="0.5"/>

  <!-- Purity with holographic background -->
  <rect x="55" y="78" width="90" height="14" fill="url(#holoStripe)" rx="2" opacity="0.4"/>
  <text x="100" y="89" font-family="'Inter', Helvetica, sans-serif" font-size="8" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="1.5">99%+ HPLC</text>

  <!-- Research use only -->
  <text x="100" y="109" font-family="'Inter', Helvetica, sans-serif" font-size="4.5" font-weight="500" fill="#C4A265" text-anchor="middle" letter-spacing="1">FOR RESEARCH USE ONLY</text>

  <!-- COA VERIFIED seal (bottom right) -->
  <circle cx="180" cy="100" r="10" fill="none" stroke="url(#holo)" stroke-width="1"/>
  <text x="180" y="99" font-family="Georgia, serif" font-size="5" fill="#C4A265" text-anchor="middle" font-weight="700">COA</text>
  <text x="180" y="105" font-family="'Inter', sans-serif" font-size="3" fill="#C4A265" text-anchor="middle">VERIFIED</text>
</svg>