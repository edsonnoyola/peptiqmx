[functions]
  directory = "netlify/functions"
  included_files = ["netlify/functions/peptiq-kb.md"]

# Legal consolidation redirects (2026-05-13)
[[redirects]]
  from = "/legal.html"
  to = "/terminos.html"
  status = 301

[[redirects]]
  from = "/terms.html"
  to = "/terminos.html"
  status = 301

[[redirects]]
  from = "/privacy.html"
  to = "/privacidad.html"
  status = 301

[[redirects]]
  from = "/verify/*"
  to = "/verify/index.html"
  status = 200

[[redirects]]
  from = "/api/assistant"
  to = "/.netlify/functions/peptiq-assistant"
  status = 200

[[redirects]]
  from = "/api/legal-record"
  to = "/.netlify/functions/peptiq-legal-record"
  status = 200

[[redirects]]
  from = "/api/reminder-optin"
  to = "/.netlify/functions/peptiq-reminder-optin"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/peptiq-stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/inventory"
  to = "/.netlify/functions/peptiq-inventory-get"
  status = 200

[[redirects]]
  from = "/api/push-subscribe"
  to = "/.netlify/functions/peptiq-push-subscribe"
  status = 200

[[redirects]]
  from = "/api/state-sync"
  to = "/.netlify/functions/peptiq-state-sync"
  status = 200

[[redirects]]
  from = "/api/sales-manual"
  to = "/.netlify/functions/peptiq-sales-manual"
  status = 200

[[redirects]]
  from = "/api/sales-master"
  to = "/.netlify/functions/peptiq-sales-master"
  status = 200

[[redirects]]
  from = "/api/quiz-submit"
  to = "/.netlify/functions/peptiq-quiz-submit"
  status = 200

[functions."peptiq-reminder-cron"]
  schedule = "*/15 * * * *"

[functions."peptiq-stories-cron"]
  schedule = "0 * * * *"

[functions."peptiq-reels-cron"]
  schedule = "0 * * * *"

[functions."peptiq-edu-cron"]
  schedule = "0 * * * *"

# Daily ads report · 9am MX = 15:00 UTC
[functions."peptiq-ads-daily-report"]
  schedule = "0 15 * * *"

# Auto-encuesta calidad post-entrega · cada hora (16-23 UTC = 10am-5pm MX)
[functions."peptiq-encuesta-cron"]
  schedule = "0 16-23 * * *"

[[headers]]
  for = "/img/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://sara-backend.edson-633.workers.dev https://hwyrxlnycrlgohrecbpx.supabase.co; img-src 'self' data: https:; frame-ancestors 'none'"
    Cache-Control = "no-store, no-cache, must-revalidate, private"

[[redirects]]
  from = "/api/consent-log"
  to = "/.netlify/functions/peptiq-consent-log"
  status = 200

[[redirects]]
  from = "/api/consent-check"
  to = "/.netlify/functions/peptiq-consent-check"
  status = 200
