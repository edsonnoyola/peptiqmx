    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      font-size: 11px;
      letter-spacing: 4px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .card {
      background: #1A1A1A;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 48px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      padding: 8px 20px;
      font-size: 11px;
      letter-spacing: 2px;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 32px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .product-line {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--beige);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .product-name {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .product-dose {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      margin-bottom: 40px;
    }
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 32px;
    }
    .data-cell {
      background: #1A1A1A;
      padding: 20px 16px;
      text-align: left;
    }
    .data-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .data-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
    }
    .data-value.green { color: var(--green); }
    .data-value.gold { color: var(--beige); }
    .method-tag {
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 16px;
      display: inline-block;
      margin-bottom: 32px;

      padding: 20px;
      text-align: left;

    .allergen-title {

      color: rgba(255,255,255,0.55);

      text-decoration: none;
      transition: color 0.2s;
      margin: 0 auto;
      width: fit-content;

    .footer-note {

      color: rgba(255,255,255,0.15);
      letter-spacing: 0.5px;
      text-align: center;

      font-weight: 300;

    function getSlug() {
      // Accept both formats:
      //   /verify/bpc-157  (path-based, used in printed labels)
      //   /verify/?id=bpc-157  (query-based, used in QR codes)
      const qs = new URLSearchParams(window.location.search);
      const fromQuery = qs.get('id');
      if (fromQuery) return fromQuery.trim().toLowerCase();
      const path = window.location.pathname.replace(/\/$/, '');
      const parts = path.split('/').filter(Boolean);
      const last = parts[parts.length - 1] || '';
      if (last === 'verify' || last === 'index.html') return '';
      return last.toLowerCase();
    }

          <p>Check the QR code or visit peptiqmx.com</p>

            </div>
          </div>
          <div class="method-tag">Validation method: ${p.method}${p.janoshikTask ? ' · Task ' + p.janoshikTask : ''}</div><br>
          <a class="janoshik-link" href="https://janoshik.com/verify/${p.janoshikKey || ''}" target="_blank" rel="noopener">

              </div>
            `).join('')}
          </div>` : ''}
          ${!p.janoshikKey ? `
          <div class="pending-coa-notice">
            <div class="pending-coa-title">COA Janoshik en proceso</div>
