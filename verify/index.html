<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PEPTIQ — Batch Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #111111;
      --white: #FFFFFF;
      --gray: #F5F5F5;
      --text-secondary: #777777;
      --green: #22C55E;
      --beige: #C6A969;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .logo {
      font-size: 11px;
      letter-spacing: 4px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .card {
      background: #1A1A1A;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 48px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      padding: 8px 20px;
      font-size: 11px;
      letter-spacing: 2px;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 32px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .product-line {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--beige);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .product-name {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .product-dose {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      margin-bottom: 40px;
    }
    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 32px;
    }
    .data-cell {
      background: #1A1A1A;
      padding: 20px 16px;
      text-align: left;
    }
    .data-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .data-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
    }
    .data-value.green { color: var(--green); }
    .data-value.gold { color: var(--beige); }
    .method-tag {
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 16px;
      display: inline-block;
      margin-bottom: 32px;
    }
    .allergen-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 20px;
      text-align: left;
      margin-bottom: 24px;
    }
    .allergen-title {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .allergen-text {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }
    .janoshik-link {
      display: block;
      font-size: 11px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 3px;
      text-decoration: none;
      transition: color 0.2s;
      margin: 0 auto;
      width: fit-content;
    }
    .janoshik-link:hover { color: var(--white); }
    .footer-note {
      margin-top: 48px;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.5px;
      text-align: center;
      max-width: 360px;
    }
    .not-found {
      text-align: center;
    }
    .not-found h2 {
      font-size: 18px;
      font-weight: 300;
      margin-bottom: 12px;
    }
    .not-found p {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>

    function getSlug() {
      // from URL: /verify/bpc-157 or /verify/bpc-157/
      const path = window.location.pathname;
      const parts = path.split('/').filter(Boolean);
      return parts[parts.length - 1] || '';
    }

    function render() {
      const slug = getSlug();
      const p = CATALOG[slug];
      const el = document.getElementById('content');

      if (!p) {
        el.innerHTML = `<div class="card not-found">
          <h2>Product not found</h2>
          <p>Check the QR code or visit peptiqmx.com</p>
        </div>`;
        return;
      }

      document.title = `PEPTIQ — ${p.name} Verification`;

      el.innerHTML = `
        <div class="card">
          <div class="status-badge">
            <span class="status-dot"></span>
            VERIFIED
          </div>
          <div class="product-line" style="color:${p.lineColor}">${p.line}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-dose">${p.dose}</div>
          <div class="data-grid">
            <div class="data-cell">
              <div class="data-label">Purity</div>
              <div class="data-value green">${p.purity}</div>
            </div>
            <div class="data-cell">
              <div class="data-label">Actual Content</div>
              <div class="data-value">${p.content}</div>
            </div>
            <div class="data-cell">
              <div class="data-label">Batch</div>
              <div class="data-value gold">${p.lot}</div>
            </div>
            <div class="data-cell">
              <div class="data-label">Expiry</div>
              <div class="data-value">${p.expiry}</div>
            </div>
          </div>
          <div class="method-tag">Validation method: ${p.method}${p.janoshikTask ? ' · Task ' + p.janoshikTask : ''}</div><br>

          </a>
          ${p.allergen ? `
          <div class="allergen-box" style="margin-top:24px;">
            <div class="allergen-title">Epítopos alergénicos</div>
            <div class="allergen-text">${p.allergen}</div>

    render();

</body>
</html>
